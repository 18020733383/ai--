<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>本地图片管理器</title>
    <style>
      body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: #0f1115; color: #e6e8ef; }
      .wrap { max-width: 980px; margin: 0 auto; padding: 24px; }
      .card { background: #151820; border: 1px solid #2a2f3a; border-radius: 12px; padding: 16px; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      .row + .row { margin-top: 16px; }
      label { font-size: 12px; color: #9aa3b2; display: block; margin-bottom: 6px; }
      select, input, button { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #2a2f3a; background: #0f1115; color: #e6e8ef; }
      button { background: #2a3647; cursor: pointer; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
      .thumb { border: 1px solid #2a2f3a; border-radius: 10px; padding: 8px; background: #0f1115; text-align: center; }
      .thumb img { width: 100%; height: 120px; object-fit: contain; background: #111; border-radius: 6px; }
      .muted { color: #8a93a3; font-size: 12px; }
      .title { font-size: 20px; font-weight: 600; margin-bottom: 12px; }
      .status { font-size: 12px; color: #7dd3fc; min-height: 16px; }
      .tabs { display: flex; gap: 10px; margin-bottom: 14px; }
      .tab { padding: 10px 12px; border-radius: 10px; border: 1px solid #2a2f3a; background: #0f1115; color: #e6e8ef; cursor: pointer; }
      .tab.active { background: #2a3647; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="title">本地图片管理器</div>
      <div class="tabs">
        <button class="tab active" id="tabHero">英雄</button>
        <button class="tab" id="tabTroop">兵种</button>
      </div>

      <div class="card" id="heroPanel">
        <div class="row">
          <div>
            <label>英雄</label>
            <select id="heroSelect"></select>
          </div>
          <div>
            <label>表情</label>
            <select id="expressionSelect">
              <option value="IDLE">IDLE</option>
              <option value="HAPPY">HAPPY</option>
              <option value="SAD">SAD</option>
              <option value="ANGRY">ANGRY</option>
              <option value="AFRAID">AFRAID</option>
              <option value="SURPRISED">SURPRISED</option>
              <option value="AWKWARD">AWKWARD</option>
              <option value="SILENT">SILENT</option>
              <option value="DEAD">DEAD</option>
            </select>
          </div>
        </div>
        <div class="row">
          <div>
            <label>上传文件（png/jpg/jpeg）</label>
            <input id="fileInput" type="file" accept=".png,.jpg,.jpeg" />
          </div>
          <div>
            <label>操作</label>
            <button id="uploadBtn" disabled>上传并覆盖该表情</button>
          </div>
        </div>
        <div class="row">
          <div>
            <label>已有文件</label>
            <select id="existingFileSelect"></select>
          </div>
          <div>
            <label>操作</label>
            <button id="renameBtn" disabled>直接改名为该表情</button>
          </div>
        </div>
        <div class="row">
          <div class="status" id="statusText"></div>
          <div class="muted" id="currentFile"></div>
        </div>
      </div>

      <div class="card" id="heroGridCard" style="margin-top: 16px;">
        <div class="title" style="font-size: 16px;">当前英雄文件</div>
        <div class="grid" id="fileGrid"></div>
      </div>

      <div class="card" id="troopPanel" style="display: none; margin-top: 16px;">
        <div class="row">
          <div>
            <label>兵种</label>
            <select id="troopSelect"></select>
          </div>
          <div>
            <label>已有图片</label>
            <div class="muted" id="troopCurrentFile">当前文件：无</div>
          </div>
        </div>
        <div class="row">
          <div>
            <label>上传文件（png/jpg/jpeg）</label>
            <input id="troopFileInput" type="file" accept=".png,.jpg,.jpeg" />
          </div>
          <div>
            <label>操作</label>
            <button id="troopUploadBtn" disabled>上传并覆盖</button>
          </div>
        </div>
        <div class="row">
          <div>
            <label>操作</label>
            <button id="troopDeleteBtn" disabled>删除图片</button>
          </div>
          <div>
            <label>状态</label>
            <div class="status" id="troopStatusText"></div>
          </div>
        </div>
        <div class="row">
          <div style="grid-column: 1 / -1;">
            <label>预览</label>
            <div class="grid" id="troopGrid"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const tabHero = document.getElementById('tabHero');
      const tabTroop = document.getElementById('tabTroop');
      const heroPanel = document.getElementById('heroPanel');
      const heroGridCard = document.getElementById('heroGridCard');
      const troopPanel = document.getElementById('troopPanel');

      const heroSelect = document.getElementById('heroSelect');
      const expressionSelect = document.getElementById('expressionSelect');
      const fileInput = document.getElementById('fileInput');
      const uploadBtn = document.getElementById('uploadBtn');
      const existingFileSelect = document.getElementById('existingFileSelect');
      const renameBtn = document.getElementById('renameBtn');
      const statusText = document.getElementById('statusText');
      const currentFile = document.getElementById('currentFile');
      const fileGrid = document.getElementById('fileGrid');

      const troopSelect = document.getElementById('troopSelect');
      const troopFileInput = document.getElementById('troopFileInput');
      const troopUploadBtn = document.getElementById('troopUploadBtn');
      const troopDeleteBtn = document.getElementById('troopDeleteBtn');
      const troopStatusText = document.getElementById('troopStatusText');
      const troopCurrentFile = document.getElementById('troopCurrentFile');
      const troopGrid = document.getElementById('troopGrid');

      const setStatus = (text) => { statusText.textContent = text || ''; };
      const setTroopStatus = (text) => { troopStatusText.textContent = text || ''; };

      const setActiveTab = (key) => {
        const isHero = key === 'HERO';
        tabHero.classList.toggle('active', isHero);
        tabTroop.classList.toggle('active', !isHero);
        heroPanel.style.display = isHero ? '' : 'none';
        heroGridCard.style.display = isHero ? '' : 'none';
        troopPanel.style.display = isHero ? 'none' : '';
      };

      const fetchHeroes = async () => {
        const res = await fetch('/api/heroes');
        const data = await res.json();
        heroSelect.innerHTML = data.heroes.map(h => `<option value="${h}">${h}</option>`).join('');
      };

      const fetchHeroFiles = async () => {
        const heroId = heroSelect.value;
        if (!heroId) return;
        const res = await fetch(`/api/hero/${encodeURIComponent(heroId)}`);
        const data = await res.json();
        const files = data.files || [];
        renderFiles(heroId, files);
        renderCurrentExpression(files);
        renderFileOptions(files);
      };

      const renderFiles = (heroId, files) => {
        if (!files.length) {
          fileGrid.innerHTML = '<div class="muted">没有文件</div>';
          return;
        }
        fileGrid.innerHTML = files.map(file => `
          <div class="thumb">
            <img src="/files/${encodeURIComponent(heroId)}/${encodeURIComponent(file)}" alt="${file}" />
            <div class="muted">${file}</div>
          </div>
        `).join('');
      };

      const renderCurrentExpression = (files) => {
        const expr = expressionSelect.value;
        const match = files.find(f => f.startsWith(expr + '.'));
        currentFile.textContent = match ? `当前文件：${match}` : '当前文件：无';
      };

      const renderFileOptions = (files) => {
        if (!files.length) {
          existingFileSelect.innerHTML = '';
          renameBtn.disabled = true;
          return;
        }
        existingFileSelect.innerHTML = files.map(f => `<option value="${f}">${f}</option>`).join('');
        renameBtn.disabled = !existingFileSelect.value;
      };

      const uploadFile = async () => {
        const heroId = heroSelect.value;
        const expression = expressionSelect.value;
        const file = fileInput.files[0];
        if (!heroId || !expression || !file) return;
        setStatus('上传中...');
        const dataUrl = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
        const res = await fetch('/api/upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ heroId, expression, dataUrl })
        });
        const data = await res.json();
        if (!res.ok) {
          setStatus(data.error || '上传失败');
          return;
        }
        setStatus('上传成功');
        fileInput.value = '';
        uploadBtn.disabled = true;
        await fetchHeroFiles();
      };

      const renameFile = async () => {
        const heroId = heroSelect.value;
        const expression = expressionSelect.value;
        const fileName = existingFileSelect.value;
        if (!heroId || !expression || !fileName) return;
        setStatus('改名中...');
        const res = await fetch('/api/rename', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ heroId, expression, fileName })
        });
        const data = await res.json();
        if (!res.ok) {
          setStatus(data.error || '改名失败');
          return;
        }
        setStatus('改名成功');
        await fetchHeroFiles();
      };

      const fetchTroops = async () => {
        const res = await fetch('/api/troops');
        const data = await res.json();
        const troops = data.troops || [];
        troopSelect.innerHTML = troops.map(t => `<option value="${t.id}">${t.name}（${t.id}）</option>`).join('');
      };

      const fetchTroopFiles = async () => {
        const troopId = troopSelect.value;
        if (!troopId) return;
        const res = await fetch(`/api/troop/${encodeURIComponent(troopId)}`);
        const data = await res.json();
        const files = data.files || [];
        troopDeleteBtn.disabled = files.length === 0;
        renderTroopFiles(files);
      };

      const renderTroopFiles = (files) => {
        if (!files.length) {
          troopGrid.innerHTML = '<div class="muted">没有文件</div>';
          troopCurrentFile.textContent = '当前文件：无';
          return;
        }
        troopCurrentFile.textContent = `当前文件：${files[0]}`;
        troopGrid.innerHTML = files.map(file => `
          <div class="thumb">
            <img src="/troop-files/${encodeURIComponent(file)}" alt="${file}" />
            <div class="muted">${file}</div>
          </div>
        `).join('');
      };

      const uploadTroopFile = async () => {
        const troopId = troopSelect.value;
        const file = troopFileInput.files[0];
        if (!troopId || !file) return;
        setTroopStatus('上传中...');
        const dataUrl = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
        const res = await fetch('/api/troop/upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ troopId, dataUrl })
        });
        const data = await res.json();
        if (!res.ok) {
          setTroopStatus(data.error || '上传失败');
          return;
        }
        setTroopStatus('上传成功');
        troopFileInput.value = '';
        troopUploadBtn.disabled = true;
        await fetchTroopFiles();
      };

      const deleteTroopFile = async () => {
        const troopId = troopSelect.value;
        if (!troopId) return;
        setTroopStatus('删除中...');
        const res = await fetch('/api/troop/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ troopId })
        });
        const data = await res.json();
        if (!res.ok) {
          setTroopStatus(data.error || '删除失败');
          return;
        }
        setTroopStatus('删除成功');
        await fetchTroopFiles();
      };

      fileInput.addEventListener('change', () => {
        uploadBtn.disabled = !fileInput.files.length;
      });
      existingFileSelect.addEventListener('change', () => {
        renameBtn.disabled = !existingFileSelect.value;
      });
      heroSelect.addEventListener('change', fetchHeroFiles);
      expressionSelect.addEventListener('change', fetchHeroFiles);
      uploadBtn.addEventListener('click', uploadFile);
      renameBtn.addEventListener('click', renameFile);

      troopFileInput.addEventListener('change', () => {
        troopUploadBtn.disabled = !troopFileInput.files.length;
      });
      troopSelect.addEventListener('change', fetchTroopFiles);
      troopUploadBtn.addEventListener('click', uploadTroopFile);
      troopDeleteBtn.addEventListener('click', deleteTroopFile);
      tabHero.addEventListener('click', () => setActiveTab('HERO'));
      tabTroop.addEventListener('click', () => setActiveTab('TROOP'));

      fetchHeroes().then(fetchHeroFiles);
      fetchTroops().then(fetchTroopFiles);
    </script>
  </body>
</html>
