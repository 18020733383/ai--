<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>本地图片管理器</title>
    <style>
      body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: #0f1115; color: #e6e8ef; }
      .wrap { max-width: 980px; margin: 0 auto; padding: 24px; }
      .card { background: #151820; border: 1px solid #2a2f3a; border-radius: 12px; padding: 16px; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      .row + .row { margin-top: 16px; }
      label { font-size: 12px; color: #9aa3b2; display: block; margin-bottom: 6px; }
      select, input, button { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #2a2f3a; background: #0f1115; color: #e6e8ef; }
      button { background: #2a3647; cursor: pointer; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
      .thumb { border: 1px solid #2a2f3a; border-radius: 10px; padding: 8px; background: #0f1115; text-align: center; }
      .thumb img { width: 100%; height: 120px; object-fit: contain; background: #111; border-radius: 6px; }
      .muted { color: #8a93a3; font-size: 12px; }
      .title { font-size: 20px; font-weight: 600; margin-bottom: 12px; }
      .status { font-size: 12px; color: #7dd3fc; min-height: 16px; }
      .tabs { display: flex; gap: 10px; margin-bottom: 14px; }
      .tab { padding: 10px 12px; border-radius: 10px; border: 1px solid #2a2f3a; background: #0f1115; color: #e6e8ef; cursor: pointer; }
      .tab.active { background: #2a3647; }
      .progress { width: 100%; height: 12px; background: #0f1115; border: 1px solid #2a2f3a; border-radius: 999px; overflow: hidden; }
      .progress > div { height: 100%; width: 0%; background: linear-gradient(90deg, #7dd3fc, #a78bfa); transition: width 180ms ease; }
      .log { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; white-space: pre-wrap; background: #0f1115; border: 1px solid #2a2f3a; border-radius: 10px; padding: 10px; max-height: 220px; overflow: auto; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="title">本地图片管理器</div>
      <div class="tabs">
        <button class="tab active" id="tabHero">英雄</button>
        <button class="tab" id="tabTroop">兵种</button>
      </div>

      <div class="card" id="heroPanel">
        <div class="row">
          <div>
            <label>英雄</label>
            <select id="heroSelect"></select>
          </div>
          <div>
            <label>表情</label>
            <select id="expressionSelect">
              <option value="IDLE">IDLE</option>
              <option value="HAPPY">HAPPY</option>
              <option value="SAD">SAD</option>
              <option value="ANGRY">ANGRY</option>
              <option value="AFRAID">AFRAID</option>
              <option value="SURPRISED">SURPRISED</option>
              <option value="AWKWARD">AWKWARD</option>
              <option value="SILENT">SILENT</option>
              <option value="DEAD">DEAD</option>
            </select>
          </div>
        </div>
        <div class="row">
          <div>
            <label>上传文件（png/jpg/jpeg）</label>
            <input id="fileInput" type="file" accept=".png,.jpg,.jpeg" />
          </div>
          <div>
            <label>操作</label>
            <button id="uploadBtn" disabled>上传并覆盖该表情</button>
          </div>
        </div>
        <div class="row">
          <div>
            <label>已有文件</label>
            <select id="existingFileSelect"></select>
          </div>
          <div>
            <label>操作</label>
            <button id="renameBtn" disabled>直接改名为该表情</button>
          </div>
        </div>
        <div class="row">
          <div class="status" id="statusText"></div>
          <div class="muted" id="currentFile"></div>
        </div>
      </div>

      <div class="card" id="heroGridCard" style="margin-top: 16px;">
        <div class="title" style="font-size: 16px;">当前英雄文件</div>
        <div class="grid" id="fileGrid"></div>
      </div>

      <div class="card" id="troopPanel" style="display: none; margin-top: 16px;">
        <div class="row">
          <div>
            <label>兵种</label>
            <select id="troopSelect"></select>
          </div>
          <div>
            <label>已有图片</label>
            <div class="muted" id="troopCurrentFile">当前文件：无</div>
          </div>
        </div>
        <div class="row">
          <div>
            <label>上传文件（png/jpg/jpeg）</label>
            <input id="troopFileInput" type="file" accept=".png,.jpg,.jpeg" />
          </div>
          <div>
            <label>操作</label>
            <button id="troopUploadBtn" disabled>上传并覆盖</button>
          </div>
        </div>
        <div class="row">
          <div>
            <label>操作</label>
            <button id="troopDeleteBtn" disabled>删除图片</button>
          </div>
          <div>
            <label>状态</label>
            <div class="status" id="troopStatusText"></div>
          </div>
        </div>
        <div class="row">
          <div style="grid-column: 1 / -1;">
            <label>预览</label>
            <div class="grid" id="troopGrid"></div>
          </div>
        </div>

        <div class="row" style="margin-top: 10px;">
          <div style="grid-column: 1 / -1;">
            <div class="title" style="font-size: 16px; margin: 0 0 10px;">批量生成兵种图片</div>
            <div class="muted" style="margin-bottom: 12px;">
              自动跳过已有图片的兵种；文本先批量生成（默认 5 组），再逐个生图并写入 image/troops。图片要求：1:1、无文字、统一背景与画风。
            </div>
          </div>
        </div>

        <div class="row">
          <div>
            <label>文本模型 Base URL（OpenAI 兼容）</label>
            <input id="txtBaseUrl" placeholder="例如 https://api.openai.com" />
          </div>
          <div>
            <label>文本模型 Model</label>
            <input id="txtModel" placeholder="例如 gpt-4o-mini" />
          </div>
        </div>
        <div class="row">
          <div>
            <label>文本模型 API Key</label>
            <input id="txtKey" type="password" placeholder="sk-..." />
          </div>
          <div>
            <label>生图模型 Base URL（OpenAI 兼容）</label>
            <input id="imgBaseUrl" placeholder="例如 https://api.openai.com" />
          </div>
        </div>
        <div class="row">
          <div>
            <label>生图模型 Model</label>
            <input id="imgModel" placeholder="例如 gpt-image-1 / dall-e-3" />
          </div>
          <div>
            <label>生图模型 API Key</label>
            <input id="imgKey" type="password" placeholder="sk-..." />
          </div>
        </div>
        <div class="row">
          <div>
            <label>生图接口（端点）</label>
            <select id="imgEndpointMode">
              <option value="AUTO">自动（images 404/405 时回退 chat）</option>
              <option value="IMAGES">/v1/images/generations（POST）</option>
              <option value="CHAT">/v1/chat/completions（POST，要求返回 b64_png JSON）</option>
            </select>
            <div class="muted" style="margin-top: 6px;">
              文本：/v1/chat/completions（POST）｜生图：/v1/images/generations（POST）或回退 chat
            </div>
            <div class="muted" style="margin-top: 6px;">
              兼容某些服务端以“流式 chunk/拼接 JSON/直接给图片链接”的方式返回；会自动提取链接并下载保存。
            </div>
          </div>
          <div></div>
        </div>

        <div class="row">
          <div>
            <label>文本批量大小</label>
            <input id="batchSize" type="number" min="1" max="20" value="5" />
          </div>
          <div>
            <label>发送间隔（ms）</label>
            <input id="sendIntervalMs" type="number" min="0" step="100" value="800" />
          </div>
        </div>
        <div class="row">
          <div>
            <label>异常重试间隔（ms）</label>
            <input id="retryIntervalMs" type="number" min="200" step="200" value="3000" />
          </div>
          <div>
            <label>异常重试最大次数</label>
            <input id="maxRetries" type="number" min="0" max="20" value="3" />
          </div>
        </div>

        <div class="row">
          <div>
            <label>进度</label>
            <div class="progress"><div id="genProgressBar"></div></div>
            <div class="muted" id="genProgressText" style="margin-top: 6px;">未开始</div>
          </div>
          <div>
            <label>操作</label>
            <div style="display: flex; gap: 10px;">
              <button id="startGenBtn">开始批量生成</button>
              <button id="stopGenBtn" disabled>停止</button>
            </div>
          </div>
        </div>

        <div class="row">
          <div style="grid-column: 1 / -1;">
            <label>日志</label>
            <div class="log" id="genLog"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const tabHero = document.getElementById('tabHero');
      const tabTroop = document.getElementById('tabTroop');
      const heroPanel = document.getElementById('heroPanel');
      const heroGridCard = document.getElementById('heroGridCard');
      const troopPanel = document.getElementById('troopPanel');

      const heroSelect = document.getElementById('heroSelect');
      const expressionSelect = document.getElementById('expressionSelect');
      const fileInput = document.getElementById('fileInput');
      const uploadBtn = document.getElementById('uploadBtn');
      const existingFileSelect = document.getElementById('existingFileSelect');
      const renameBtn = document.getElementById('renameBtn');
      const statusText = document.getElementById('statusText');
      const currentFile = document.getElementById('currentFile');
      const fileGrid = document.getElementById('fileGrid');

      const troopSelect = document.getElementById('troopSelect');
      const troopFileInput = document.getElementById('troopFileInput');
      const troopUploadBtn = document.getElementById('troopUploadBtn');
      const troopDeleteBtn = document.getElementById('troopDeleteBtn');
      const troopStatusText = document.getElementById('troopStatusText');
      const troopCurrentFile = document.getElementById('troopCurrentFile');
      const troopGrid = document.getElementById('troopGrid');

      const txtBaseUrl = document.getElementById('txtBaseUrl');
      const txtModel = document.getElementById('txtModel');
      const txtKey = document.getElementById('txtKey');
      const imgBaseUrl = document.getElementById('imgBaseUrl');
      const imgModel = document.getElementById('imgModel');
      const imgKey = document.getElementById('imgKey');
      const imgEndpointMode = document.getElementById('imgEndpointMode');
      const batchSize = document.getElementById('batchSize');
      const sendIntervalMs = document.getElementById('sendIntervalMs');
      const retryIntervalMs = document.getElementById('retryIntervalMs');
      const maxRetries = document.getElementById('maxRetries');
      const startGenBtn = document.getElementById('startGenBtn');
      const stopGenBtn = document.getElementById('stopGenBtn');
      const genProgressBar = document.getElementById('genProgressBar');
      const genProgressText = document.getElementById('genProgressText');
      const genLog = document.getElementById('genLog');

      const setStatus = (text) => { statusText.textContent = text || ''; };
      const setTroopStatus = (text) => { troopStatusText.textContent = text || ''; };
      const appendLog = (text) => {
        const line = `[${new Date().toLocaleTimeString('zh-CN', { hour12: false })}] ${text}`;
        genLog.textContent = (genLog.textContent ? (genLog.textContent + '\n') : '') + line;
        genLog.scrollTop = genLog.scrollHeight;
      };

      const sleep = (ms) => new Promise(resolve => setTimeout(resolve, Math.max(0, Number(ms) || 0)));

      const loadGenSettings = () => {
        const raw = localStorage.getItem('troopGenSettings');
        if (!raw) return;
        try {
          const s = JSON.parse(raw);
          txtBaseUrl.value = s.txtBaseUrl || '';
          txtModel.value = s.txtModel || '';
          txtKey.value = s.txtKey || '';
          imgBaseUrl.value = s.imgBaseUrl || '';
          imgModel.value = s.imgModel || '';
          imgKey.value = s.imgKey || '';
          imgEndpointMode.value = s.imgEndpointMode || 'AUTO';
          batchSize.value = String(s.batchSize ?? 5);
          sendIntervalMs.value = String(s.sendIntervalMs ?? 800);
          retryIntervalMs.value = String(s.retryIntervalMs ?? 3000);
          maxRetries.value = String(s.maxRetries ?? 3);
        } catch {}
      };

      const saveGenSettings = () => {
        const s = {
          txtBaseUrl: txtBaseUrl.value.trim(),
          txtModel: txtModel.value.trim(),
          txtKey: txtKey.value,
          imgBaseUrl: imgBaseUrl.value.trim(),
          imgModel: imgModel.value.trim(),
          imgKey: imgKey.value,
          imgEndpointMode: imgEndpointMode.value,
          batchSize: Number(batchSize.value || 5),
          sendIntervalMs: Number(sendIntervalMs.value || 0),
          retryIntervalMs: Number(retryIntervalMs.value || 0),
          maxRetries: Number(maxRetries.value || 0),
        };
        localStorage.setItem('troopGenSettings', JSON.stringify(s));
      };

      const setActiveTab = (key) => {
        const isHero = key === 'HERO';
        tabHero.classList.toggle('active', isHero);
        tabTroop.classList.toggle('active', !isHero);
        heroPanel.style.display = isHero ? '' : 'none';
        heroGridCard.style.display = isHero ? '' : 'none';
        troopPanel.style.display = isHero ? 'none' : '';
      };

      const fetchHeroes = async () => {
        const res = await fetch('/api/heroes');
        const data = await res.json();
        heroSelect.innerHTML = data.heroes.map(h => `<option value="${h}">${h}</option>`).join('');
      };

      const fetchHeroFiles = async () => {
        const heroId = heroSelect.value;
        if (!heroId) return;
        const res = await fetch(`/api/hero/${encodeURIComponent(heroId)}`);
        const data = await res.json();
        const files = data.files || [];
        renderFiles(heroId, files);
        renderCurrentExpression(files);
        renderFileOptions(files);
      };

      const renderFiles = (heroId, files) => {
        if (!files.length) {
          fileGrid.innerHTML = '<div class="muted">没有文件</div>';
          return;
        }
        fileGrid.innerHTML = files.map(file => `
          <div class="thumb">
            <img src="/files/${encodeURIComponent(heroId)}/${encodeURIComponent(file)}" alt="${file}" />
            <div class="muted">${file}</div>
          </div>
        `).join('');
      };

      const renderCurrentExpression = (files) => {
        const expr = expressionSelect.value;
        const match = files.find(f => f.startsWith(expr + '.'));
        currentFile.textContent = match ? `当前文件：${match}` : '当前文件：无';
      };

      const renderFileOptions = (files) => {
        if (!files.length) {
          existingFileSelect.innerHTML = '';
          renameBtn.disabled = true;
          return;
        }
        existingFileSelect.innerHTML = files.map(f => `<option value="${f}">${f}</option>`).join('');
        renameBtn.disabled = !existingFileSelect.value;
      };

      const uploadFile = async () => {
        const heroId = heroSelect.value;
        const expression = expressionSelect.value;
        const file = fileInput.files[0];
        if (!heroId || !expression || !file) return;
        setStatus('上传中...');
        const dataUrl = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
        const res = await fetch('/api/upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ heroId, expression, dataUrl })
        });
        const data = await res.json();
        if (!res.ok) {
          setStatus(data.error || '上传失败');
          return;
        }
        setStatus('上传成功');
        fileInput.value = '';
        uploadBtn.disabled = true;
        await fetchHeroFiles();
      };

      const renameFile = async () => {
        const heroId = heroSelect.value;
        const expression = expressionSelect.value;
        const fileName = existingFileSelect.value;
        if (!heroId || !expression || !fileName) return;
        setStatus('改名中...');
        const res = await fetch('/api/rename', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ heroId, expression, fileName })
        });
        const data = await res.json();
        if (!res.ok) {
          setStatus(data.error || '改名失败');
          return;
        }
        setStatus('改名成功');
        await fetchHeroFiles();
      };

      const fetchTroops = async () => {
        const res = await fetch('/api/troops');
        const data = await res.json();
        const troops = data.troops || [];
        troopSelect.innerHTML = troops.map(t => `<option value="${t.id}">${t.name}（${t.id}）</option>`).join('');
      };

      const fetchTroopsWithExisting = async () => {
        const res = await fetch('/api/troops');
        const data = await res.json();
        return {
          troops: data.troops || [],
          existing: new Set((data.existing || []).map(x => String(x).trim()).filter(Boolean))
        };
      };

      const fetchTroopFiles = async () => {
        const troopId = troopSelect.value;
        if (!troopId) return;
        const res = await fetch(`/api/troop/${encodeURIComponent(troopId)}`);
        const data = await res.json();
        const files = data.files || [];
        troopDeleteBtn.disabled = files.length === 0;
        renderTroopFiles(files);
      };

      const renderTroopFiles = (files) => {
        if (!files.length) {
          troopGrid.innerHTML = '<div class="muted">没有文件</div>';
          troopCurrentFile.textContent = '当前文件：无';
          return;
        }
        troopCurrentFile.textContent = `当前文件：${files[0]}`;
        troopGrid.innerHTML = files.map(file => `
          <div class="thumb">
            <img src="/troop-files/${encodeURIComponent(file)}" alt="${file}" />
            <div class="muted">${file}</div>
          </div>
        `).join('');
      };

      const uploadTroopFile = async () => {
        const troopId = troopSelect.value;
        const file = troopFileInput.files[0];
        if (!troopId || !file) return;
        setTroopStatus('上传中...');
        const dataUrl = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
        const res = await fetch('/api/troop/upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ troopId, dataUrl })
        });
        const data = await res.json();
        if (!res.ok) {
          setTroopStatus(data.error || '上传失败');
          return;
        }
        setTroopStatus('上传成功');
        troopFileInput.value = '';
        troopUploadBtn.disabled = true;
        await fetchTroopFiles();
      };

      const deleteTroopFile = async () => {
        const troopId = troopSelect.value;
        if (!troopId) return;
        setTroopStatus('删除中...');
        const res = await fetch('/api/troop/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ troopId })
        });
        const data = await res.json();
        if (!res.ok) {
          setTroopStatus(data.error || '删除失败');
          return;
        }
        setTroopStatus('删除成功');
        await fetchTroopFiles();
      };

      let isGenerating = false;
      let stopRequested = false;

      const setProgress = (done, total, currentText) => {
        const safeTotal = Math.max(0, Number(total) || 0);
        const safeDone = Math.max(0, Math.min(safeTotal, Number(done) || 0));
        const ratio = safeTotal === 0 ? 0 : (safeDone / safeTotal);
        genProgressBar.style.width = `${Math.round(ratio * 100)}%`;
        genProgressText.textContent = safeTotal === 0
          ? (currentText || '没有需要生成的图片')
          : `${safeDone}/${safeTotal}（${Math.round(ratio * 100)}%）${currentText ? ` · ${currentText}` : ''}`;
      };

      const requestDescriptions = async (troops, attemptInfo) => {
        const body = {
          baseUrl: txtBaseUrl.value.trim(),
          apiKey: txtKey.value,
          model: txtModel.value.trim(),
          troops
        };
        const res = await fetch('/api/ai/troop-descriptions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || attemptInfo || '描述生成失败');
        const items = data.items || [];
        const map = new Map(items.map(x => [x.id, x]));
        return map;
      };

      const requestImage = async (troopId, prompt, attemptInfo) => {
        const body = {
          baseUrl: imgBaseUrl.value.trim(),
          apiKey: imgKey.value,
          model: imgModel.value.trim(),
          troopId,
          prompt,
          size: '1024x1024',
          sendIntervalMs: 0,
          endpointMode: imgEndpointMode.value || 'AUTO'
        };
        const res = await fetch('/api/ai/troop-image', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || attemptInfo || '生图失败');
        return data;
      };

      const startBatchGenerate = async () => {
        if (isGenerating) return;
        saveGenSettings();
        genLog.textContent = '';
        stopRequested = false;
        isGenerating = true;
        startGenBtn.disabled = true;
        stopGenBtn.disabled = false;

        try {
          const settings = {
            batchSize: Math.max(1, Math.min(20, Number(batchSize.value || 5))),
            sendIntervalMs: Math.max(0, Number(sendIntervalMs.value || 0)),
            retryIntervalMs: Math.max(200, Number(retryIntervalMs.value || 200)),
            maxRetries: Math.max(0, Number(maxRetries.value || 0))
          };
          if (!txtBaseUrl.value.trim() || !txtModel.value.trim() || !txtKey.value) throw new Error('文本模型配置不完整');
          if (!imgBaseUrl.value.trim() || !imgModel.value.trim() || !imgKey.value) throw new Error('生图模型配置不完整');

          appendLog('拉取兵种列表…');
          const { troops, existing } = await fetchTroopsWithExisting();
          const missing = troops.filter(t => !existing.has(t.id));
          const total = missing.length;
          let done = 0;
          setProgress(done, total, total === 0 ? '全部已有图片' : `待生成 ${total} 张`);
          appendLog(`已存在图片：${existing.size}；待生成：${total}`);
          if (total === 0) return;

          let cursor = 0;
          while (cursor < missing.length && !stopRequested) {
            const batch = missing.slice(cursor, cursor + settings.batchSize);
            cursor += batch.length;

            appendLog(`批量生成描述：${batch.map(x => x.id).join(', ')}`);
            let descMap = null;
            for (let attempt = 0; attempt <= settings.maxRetries; attempt++) {
              try {
                descMap = await requestDescriptions(batch, `描述生成失败（尝试 ${attempt + 1}）`);
                break;
              } catch (e) {
                appendLog(`描述生成异常：${e.message || e}；${attempt >= settings.maxRetries ? '达到最大重试次数，停止' : `等待重试 ${settings.retryIntervalMs}ms`}`);
                if (attempt >= settings.maxRetries) throw e;
                await sleep(settings.retryIntervalMs);
              }
            }

            for (const troop of batch) {
              if (stopRequested) break;
              if (existing.has(troop.id)) continue;
              const item = descMap.get(troop.id);
              const prompt = item?.imagePrompt;
              if (!prompt) {
                appendLog(`跳过 ${troop.id}：缺少 imagePrompt`);
                continue;
              }

              setProgress(done, total, `生成中：${troop.name}（${troop.id}）`);
              appendLog(`生图：${troop.id}`);

              for (let attempt = 0; attempt <= settings.maxRetries; attempt++) {
                try {
                  await requestImage(troop.id, prompt, `生图失败（尝试 ${attempt + 1}）`);
                  existing.add(troop.id);
                  done += 1;
                  setProgress(done, total, `完成：${troop.name}（${troop.id}）`);
                  appendLog(`完成：${troop.id} -> image/troops/${troop.id}.png`);
                  await fetchTroopFiles().catch(() => {});
                  if (settings.sendIntervalMs > 0) await sleep(settings.sendIntervalMs);
                  break;
                } catch (e) {
                  appendLog(`生图异常：${troop.id}：${e.message || e}；${attempt >= settings.maxRetries ? '达到最大重试次数，停止' : `等待重试 ${settings.retryIntervalMs}ms`}`);
                  if (attempt >= settings.maxRetries) throw e;
                  await sleep(settings.retryIntervalMs);
                }
              }
            }
          }

          if (stopRequested) {
            appendLog('已停止。');
            setProgress(done, total, '已停止');
          } else {
            appendLog('全部完成。');
            setProgress(done, total, '全部完成');
          }
        } catch (e) {
          appendLog(`流程中止：${e.message || e}`);
          genProgressText.textContent = `中止：${e.message || e}`;
        } finally {
          isGenerating = false;
          startGenBtn.disabled = false;
          stopGenBtn.disabled = true;
        }
      };

      const stopBatchGenerate = () => {
        if (!isGenerating) return;
        stopRequested = true;
        appendLog('收到停止请求，将在当前步骤结束后停止…');
      };

      fileInput.addEventListener('change', () => {
        uploadBtn.disabled = !fileInput.files.length;
      });
      existingFileSelect.addEventListener('change', () => {
        renameBtn.disabled = !existingFileSelect.value;
      });
      heroSelect.addEventListener('change', fetchHeroFiles);
      expressionSelect.addEventListener('change', fetchHeroFiles);
      uploadBtn.addEventListener('click', uploadFile);
      renameBtn.addEventListener('click', renameFile);

      troopFileInput.addEventListener('change', () => {
        troopUploadBtn.disabled = !troopFileInput.files.length;
      });
      troopSelect.addEventListener('change', fetchTroopFiles);
      troopUploadBtn.addEventListener('click', uploadTroopFile);
      troopDeleteBtn.addEventListener('click', deleteTroopFile);
      tabHero.addEventListener('click', () => setActiveTab('HERO'));
      tabTroop.addEventListener('click', () => setActiveTab('TROOP'));
      startGenBtn.addEventListener('click', startBatchGenerate);
      stopGenBtn.addEventListener('click', stopBatchGenerate);
      [txtBaseUrl, txtModel, txtKey, imgBaseUrl, imgModel, imgKey, imgEndpointMode, batchSize, sendIntervalMs, retryIntervalMs, maxRetries].forEach(el => {
        el.addEventListener('change', saveGenSettings);
      });

      fetchHeroes().then(fetchHeroFiles);
      fetchTroops().then(fetchTroopFiles);
      loadGenSettings();
    </script>
  </body>
</html>
